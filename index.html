<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#163A35">
<meta name="description" content="A fast, offline-first library for storing and reusing your prompts.">
<title>Prompts</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prompts">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap">
<style>
  :root{
    --paper:#F5F1E6;
    --paper-soft:#EDE6D6;
    --ink:#2A241D;
    --ink-soft:#6B6357;
    --teal:#1D4B44;
    --teal-deep:#163A35;
    --rust:#B8492F;
    --sage:#92A587;
    --line: rgba(42,36,29,0.16);
    --shadow: 0 10px 24px -8px rgba(22,58,53,0.35);
  }
  *{ box-sizing:border-box; }
  #stacks-root{
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--paper);
    background-image: radial-gradient(var(--line) 0.6px, transparent 0.6px);
    background-size: 14px 14px;
    color: var(--ink);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }
  h1,h2,h3,.font-display{ font-family:'Fraunces', Georgia, serif; }
  .mono{ font-family:'IBM Plex Mono', monospace; }

  /* ---------- header ---------- */
  #app-header{
    position: sticky; top:0; z-index: 20;
    background: var(--teal-deep);
    color: var(--paper);
    padding: calc(env(safe-area-inset-top,0px) + 20px) 18px 20px;
    border-bottom: 1px solid rgba(0,0,0,0.2);
    display:flex; align-items:center; justify-content:space-between; gap:14px;
  }
  #app-header h1{ font-size:26px; font-weight:700; margin:0; letter-spacing:0.2px; flex-shrink:0; }

  #search-wrap{ flex:1; min-width:0; max-width:190px; }
  #search-box{
    display:flex; align-items:center; gap:7px;
    background: rgba(245,241,230,0.14);
    border:1px solid rgba(245,241,230,0.28);
    border-radius:100px;
    padding:9px 13px;
  }
  #search-box svg{ width:15px; height:15px; color:var(--sage); flex-shrink:0; }
  #search-input{
    border:none; background:transparent; outline:none;
    font-family:'Inter',sans-serif; font-size:13.5px; color:var(--paper);
    width:100%; min-width:0;
  }
  #search-input::placeholder{ color:rgba(245,241,230,0.65); }
  #search-input:focus{ outline:none; }
  #search-box:focus-within{ border-color:var(--paper); }

  /* ---------- grid ---------- */
  #grid{
    display:grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap:12px;
    padding:20px 16px calc(env(safe-area-inset-bottom,0px) + 110px);
  }
  .card{
    position:relative;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 14px 14px;
    box-shadow: 0 1px 0 rgba(42,36,29,0.05), 0 6px 14px -10px rgba(42,36,29,0.4);
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform .12s ease;
    border-top: 2px dashed var(--line);
    height:188px;
    width:100%;
    min-width:0;
    max-width:100%;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    content-visibility:auto;
    contain-intrinsic-size: 188px 100%;
  }
  .card:active{ transform: scale(0.97); }
  .ticket{
    display:inline-block;
    font-size:9.5px; letter-spacing:0.06em;
    color:var(--rust);
    border:1px solid var(--rust);
    padding:2px 6px; border-radius:3px;
    transform: rotate(-3deg);
    margin-bottom:10px;
    flex-shrink:0;
  }
  .card-title{
    font-size:16px; font-weight:600; line-height:1.25; margin:0 0 6px; flex-shrink:0;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    overflow-wrap:anywhere; word-break:break-word;
  }
  .card-desc{
    font-size:12.5px; line-height:1.5; color:var(--ink-soft); margin:0;
    flex:1; overflow:hidden; min-height:0;
    display:-webkit-box; -webkit-line-clamp:5; -webkit-box-orient:vertical;
    overflow-wrap:anywhere; word-break:break-word;
  }

  /* ---------- empty state ---------- */
  #empty-state{
    grid-column: 1 / -1;
    text-align:center;
    padding:50px 20px;
    color:var(--ink-soft);
  }
  #empty-state h2{ font-style:italic; font-size:20px; color:var(--ink); margin:0 0 8px; }
  #empty-state p{ font-size:13px; margin:0; }

  /* ---------- FAB ---------- */
  #fab{
    position:fixed;
    right: calc(16px + max(0px, (100vw - 480px)/2));
    bottom: calc(env(safe-area-inset-bottom,0px) + 22px);
    width:58px; height:58px; border-radius:50%;
    background:var(--rust); color:#fff; border:none;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 12px 22px -8px rgba(184,73,47,0.55);
    cursor:pointer; z-index:30;
    transition: transform .15s ease;
  }
  #fab:active{ transform: scale(0.92); }
  #fab svg{ width:24px; height:24px; }

  /* ---------- sheet ---------- */
  #overlay{
    position:fixed; inset:0; background:rgba(20,22,20,0.5);
    opacity:0; pointer-events:none; transition:opacity .22s ease;
    z-index:40;
  }
  #overlay.open{ opacity:1; pointer-events:auto; }
  #sheet{
    position:fixed; left:0; right:0; bottom:0;
    max-width:480px; margin:0 auto;
    background:var(--paper);
    border-radius:20px 20px 0 0;
    padding: 12px 20px calc(env(safe-area-inset-bottom,0px) + 22px);
    max-height:88vh; overflow-y:auto;
    transform: translateY(100%);
    transition: transform .28s cubic-bezier(.32,.72,0,1);
    z-index:41;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.25);
  }
  #sheet.open{ transform: translateY(0); }
  .drag-handle{ width:38px; height:4px; border-radius:2px; background:var(--line); margin:6px auto 14px; }

  .sheet-topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .icon-btn{
    width:34px; height:34px; border-radius:50%; border:none; background:transparent;
    display:flex; align-items:center; justify-content:center; color:var(--ink); cursor:pointer;
  }
  .icon-btn:active{ background:var(--paper-soft); }
  .icon-btn svg{ width:19px; height:19px; }
  .sheet-title{ font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; }
  .sheet-actions{ display:flex; gap:2px; }

  .field{ margin-bottom:20px; }
  .field label{
    display:block; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px;
  }
  .field input, .field textarea{
    width:100%; border:none; border-bottom:2px solid var(--line);
    background:transparent; outline:none; padding:6px 0 8px;
    color:var(--ink); font-family:'Fraunces',serif;
  }
  #title-input{ font-size:20px; font-weight:600; }
  #desc-input{ font-family:'Inter',sans-serif; font-size:14.5px; line-height:1.5; resize:vertical; min-height:110px; }
  .field input:focus, .field textarea:focus, .icon-btn:focus-visible, #fab:focus-visible, #search-input:focus{
    outline:2px solid var(--rust); outline-offset:2px;
  }
  .field.shake input{ animation: shake .3s ease; outline:2px solid var(--rust); }
  @keyframes shake{ 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }

  .btn-row{ display:flex; gap:10px; margin-top:6px; }
  .btn-primary{
    flex:1; background:var(--rust); color:#fff; border:none; border-radius:100px;
    padding:14px; font-size:13px; font-weight:600; letter-spacing:0.03em; cursor:pointer;
  }
  .btn-ghost{
    background:transparent; border:none; color:var(--ink-soft); padding:14px 16px;
    font-size:13px; cursor:pointer;
  }
  .btn-outline{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; border:1.5px solid var(--rust); color:var(--rust); background:transparent;
    border-radius:100px; padding:13px; font-size:13px; font-weight:600; cursor:pointer; margin-top:8px;
  }
  .btn-outline svg{ width:16px; height:16px; }

  .detail-desc{ font-size:14.5px; line-height:1.65; color:var(--ink); white-space:pre-wrap; margin-bottom:6px; }
  .detail-meta{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); margin-bottom:18px; }
  .detail-tags{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
  .tag-chip{
    font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.04em;
    color:var(--teal); background:var(--paper-soft);
    border:1px solid var(--line); border-radius:100px; padding:3px 9px;
  }

  /* ---------- toast ---------- */
  #toast{
    position:fixed; left:50%; bottom:100px; transform:translate(-50%,12px);
    background:var(--teal-deep); color:var(--paper); font-size:12.5px;
    padding:10px 18px; border-radius:100px; opacity:0; pointer-events:none;
    transition: all .22s ease; z-index:50; white-space:nowrap;
  }
  #toast.show{ opacity:1; transform:translate(-50%,0); }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; }
  }
</style>

</head>
<body>
<div id="stacks-root">
  <header id="app-header">
    <h1>Prompts</h1>
    <div id="search-wrap">
      <div id="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="text" placeholder="Search" />
      </div>
    </div>
  </header>

  <div id="grid"></div>

  <button id="fab" aria-label="Add prompt">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <div id="overlay"></div>
  <div id="sheet" role="dialog" aria-modal="true">
    <div class="drag-handle"></div>
    <div class="sheet-topbar">
      <button class="icon-btn" id="sheet-back" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
      </button>
      <span class="sheet-title" id="sheet-title-label">New card</span>
      <div class="sheet-actions" id="sheet-detail-actions" style="display:none;">
        <button class="icon-btn" id="detail-edit-btn" aria-label="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
        <button class="icon-btn" id="detail-delete-btn" aria-label="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
      <div id="sheet-spacer" style="width:34px;"></div>
    </div>

    <div id="form-view">
      <div class="field">
        <label for="title-input">Title</label>
        <input id="title-input" type="text" placeholder="e.g. Weekly report summary" maxlength="80" />
      </div>
      <div class="field">
        <label for="desc-input">Prompt</label>
        <textarea id="desc-input" placeholder="Write out the full prompt text…"></textarea>
      </div>
      <div class="field">
        <label for="tags-input">Tags</label>
        <input id="tags-input" type="text" placeholder="comma, separated, tags" />
      </div>
      <div class="btn-row">
        <button class="btn-ghost" id="cancel-btn">Cancel</button>
        <button class="btn-primary" id="save-btn">Save card</button>
      </div>
    </div>

    <div id="detail-view" style="display:none;">
      <h2 class="font-display" id="detail-title" style="font-size:22px; margin:0 0 6px;"></h2>
      <div class="detail-meta" id="detail-meta"></div>
      <div class="detail-tags" id="detail-tags"></div>
      <p class="detail-desc" id="detail-desc"></p>
      <button class="btn-outline" id="copy-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy prompt
      </button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  // ---- Supabase config -------------------------------------------------
  // Create a project at https://supabase.com, run supabase-schema.sql in the
  // SQL editor, then paste your URL + anon key below. Leave them as-is to
  // keep using localStorage (offline, single-device) instead.
  const SUPABASE_URL = 'YOUR_SUPABASE_URL';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
  const USE_SUPABASE = /^https?:\/\//.test(SUPABASE_URL) && !!SUPABASE_ANON_KEY;
  const supabase = (USE_SUPABASE && window.supabase)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;
  // ----------------------------------------------------------------------

  const STORAGE_KEY = 'stacks-data';
  let data = { prompts: [], seq: 1 };
  let filterText = '';
  let mode = null; // 'add' | 'edit' | 'detail'
  let activeId = null;

  const grid = document.getElementById('grid');
  const searchInput = document.getElementById('search-input');
  const fab = document.getElementById('fab');
  const overlay = document.getElementById('overlay');
  const sheet = document.getElementById('sheet');
  const sheetBack = document.getElementById('sheet-back');
  const sheetTitleLabel = document.getElementById('sheet-title-label');
  const detailActions = document.getElementById('sheet-detail-actions');
  const formView = document.getElementById('form-view');
  const detailView = document.getElementById('detail-view');
  const titleInput = document.getElementById('title-input');
  const descInput = document.getElementById('desc-input');
  const tagsInput = document.getElementById('tags-input');
  const saveBtn = document.getElementById('save-btn');
  const cancelBtn = document.getElementById('cancel-btn');
  const detailTitle = document.getElementById('detail-title');
  const detailMeta = document.getElementById('detail-meta');
  const detailTags = document.getElementById('detail-tags');
  const detailDesc = document.getElementById('detail-desc');
  const copyBtn = document.getElementById('copy-btn');
  const editBtn = document.getElementById('detail-edit-btn');
  const deleteBtn = document.getElementById('detail-delete-btn');
  const toast = document.getElementById('toast');

  async function load(){
    if(supabase){
      try{
        const { data: rows, error } = await supabase
          .from('prompts')
          .select('*')
          .order('created_at', { ascending: false });
        if(error) throw error;
        data.prompts = rows.map(r => ({
          id: r.id,
          num: r.num,
          title: r.title,
          description: r.description,
          tags: r.tags || [],
          createdAt: new Date(r.created_at).getTime()
        }));
      }catch(e){
        console.error('Supabase load failed', e);
        showToast('Could not load from server');
      }
      render();
      return;
    }
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        data.prompts = parsed.prompts || [];
        data.seq = parsed.seq || 1;
      }
    }catch(e){ /* no data yet, or storage unavailable */ }
    render();
  }

  function persistLocal(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }catch(e){ console.error('Could not save', e); showToast('Could not save — try again'); }
  }

  function debounce(fn, wait){
    let t;
    return function(...args){
      clearTimeout(t);
      t = setTimeout(() => fn.apply(this, args), wait);
    };
  }
  const debouncedRender = debounce(render, 120);
  function formatDate(ts){
    const d = new Date(ts);
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function parseTags(raw){
    return (raw || '')
      .split(',')
      .map(t => t.trim().toLowerCase())
      .filter(Boolean);
  }

  function render(){
    const q = filterText.trim().toLowerCase();
    const list = data.prompts
      .filter(p => !q || p.title.toLowerCase().includes(q) || p.description.toLowerCase().includes(q) || (p.tags || []).some(t => t.includes(q)))
      .sort((a,b) => b.createdAt - a.createdAt);

    if(list.length === 0){
      grid.innerHTML = data.prompts.length === 0
        ? '<div id="empty-state"><h2>Your stacks are empty</h2><p>Tap the + button to file your first prompt.</p></div>'
        : '<div id="empty-state"><h2>No matches</h2><p>Nothing in your stacks matches “'+escapeHtml(filterText)+'”.</p></div>';
      return;
    }

    grid.innerHTML = list.map(p => `
      <div class="card" data-id="${p.id}">
        <span class="ticket mono">No. ${String(p.num).padStart(4,'0')}</span>
        <h3 class="card-title">${escapeHtml(p.title)}</h3>
        <p class="card-desc">${escapeHtml(p.description)}</p>
      </div>
    `).join('');
  }

  function openSheet(){
    overlay.classList.add('open');
    sheet.classList.add('open');
  }
  function closeSheet(){
    overlay.classList.remove('open');
    sheet.classList.remove('open');
    mode = null; activeId = null;
  }

  function openAdd(){
    mode = 'add'; activeId = null;
    sheetTitleLabel.textContent = 'New card';
    detailActions.style.display = 'none';
    formView.style.display = 'block';
    detailView.style.display = 'none';
    titleInput.value = ''; descInput.value = ''; tagsInput.value = '';
    openSheet();
    setTimeout(() => titleInput.focus(), 250);
  }

  function openEdit(id){
    const p = data.prompts.find(x => x.id === id);
    if(!p) return;
    mode = 'edit'; activeId = id;
    sheetTitleLabel.textContent = 'Edit card';
    detailActions.style.display = 'none';
    formView.style.display = 'block';
    detailView.style.display = 'none';
    titleInput.value = p.title; descInput.value = p.description; tagsInput.value = (p.tags || []).join(', ');
    openSheet();
    setTimeout(() => titleInput.focus(), 250);
  }

  function openDetail(id){
    const p = data.prompts.find(x => x.id === id);
    if(!p) return;
    mode = 'detail'; activeId = id;
    sheetTitleLabel.textContent = 'No. ' + String(p.num).padStart(4,'0');
    detailActions.style.display = 'flex';
    formView.style.display = 'none';
    detailView.style.display = 'block';
    detailTitle.textContent = p.title;
    detailMeta.textContent = 'Filed ' + formatDate(p.createdAt);
    detailTags.innerHTML = (p.tags || []).map(t => '<span class="tag-chip">'+escapeHtml(t)+'</span>').join('');
    detailDesc.textContent = p.description;
    openSheet();
  }

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  async function saveCard(){
    const title = titleInput.value.trim();
    const description = descInput.value.trim();
    const tags = parseTags(tagsInput.value);
    if(!title){
      const field = titleInput.parentElement;
      field.classList.add('shake');
      setTimeout(() => field.classList.remove('shake'), 350);
      titleInput.focus();
      return;
    }
    try{
      if(mode === 'add'){
        if(supabase){
          const { data: row, error } = await supabase
            .from('prompts')
            .insert({ title, description, tags })
            .select()
            .single();
          if(error) throw error;
          data.prompts.unshift({
            id: row.id,
            num: row.num,
            title: row.title,
            description: row.description,
            tags: row.tags || [],
            createdAt: new Date(row.created_at).getTime()
          });
        } else {
          data.prompts.unshift({
            id: 'p' + Date.now() + Math.random().toString(36).slice(2,7),
            num: data.seq,
            title, description, tags,
            createdAt: Date.now()
          });
          data.seq += 1;
        }
        showToast('Card filed');
      } else if(mode === 'edit'){
        if(supabase){
          const { error } = await supabase
            .from('prompts')
            .update({ title, description, tags })
            .eq('id', activeId);
          if(error) throw error;
        }
        const p = data.prompts.find(x => x.id === activeId);
        if(p){ p.title = title; p.description = description; p.tags = tags; }
        showToast('Card updated');
      }
    }catch(e){
      console.error('Save failed', e);
      showToast('Could not save — try again');
      return;
    }
    if(!supabase) persistLocal();
    render();
    closeSheet();
  }

  async function deleteCard(){
    try{
      if(supabase){
        const { error } = await supabase
          .from('prompts')
          .delete()
          .eq('id', activeId);
        if(error) throw error;
      }
      data.prompts = data.prompts.filter(x => x.id !== activeId);
    }catch(e){
      console.error('Delete failed', e);
      showToast('Could not delete');
      return;
    }
    if(!supabase) persistLocal();
    render();
    closeSheet();
    showToast('Card removed');
  }

  async function copyDetail(){
    const p = data.prompts.find(x => x.id === activeId);
    if(!p) return;
    try{
      await navigator.clipboard.writeText(p.description);
      showToast('Copied to clipboard');
    }catch(e){
      showToast('Could not copy');
    }
  }

  grid.addEventListener('click', (e) => {
    const card = e.target.closest('.card');
    if(card) openDetail(card.dataset.id);
  });
  searchInput.addEventListener('input', (e) => { filterText = e.target.value; debouncedRender(); });
  fab.addEventListener('click', openAdd);
  sheetBack.addEventListener('click', closeSheet);
  cancelBtn.addEventListener('click', closeSheet);
  overlay.addEventListener('click', closeSheet);
  saveBtn.addEventListener('click', saveCard);
  deleteBtn.addEventListener('click', deleteCard);
  copyBtn.addEventListener('click', copyDetail);
  editBtn.addEventListener('click', () => openEdit(activeId));

  load();
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>
